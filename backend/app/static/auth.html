<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication - Bhoomi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #00d2ff;
            --text-main: #2d3436;
            --text-light: #636e72;
            --glass: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            background: #f8faff;
            position: relative;
        }

        /* Mesh Gradient Background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background-color: #f8faff;
            background-image:
                radial-gradient(at 0% 0%, rgba(102, 126, 234, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(118, 75, 162, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(0, 210, 255, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(102, 126, 234, 0.1) 0px, transparent 50%);
            animation: meshAnimation 20s infinite alternate;
        }

        @keyframes meshAnimation {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
            z-index: 10;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08), inset 0 0 0 1px var(--glass-border);
            overflow: hidden;
        }

        .header {
            padding: 40px 40px 20px;
            text-align: center;
        }

        .header-logo {
            font-size: 3rem;
            margin-bottom: 15px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--text-main);
        }

        .header p {
            font-size: 1rem;
            color: var(--text-light);
            font-weight: 300;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 0 40px;
        }

        .tab-btn {
            flex: 1;
            padding: 15px 0;
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1.05rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            color: var(--text-light);
            border-bottom: 3px solid transparent;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        .tab-content {
            padding: 30px 40px 40px;
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.95rem;
        }

        input,
        select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            color: var(--text-main);
            transition: all 0.3s ease;
        }

        input:focus,
        select:focus {
            outline: none;
            background: white;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        .status {
            padding: 12px 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            display: none;
            font-weight: 500;
            font-size: 0.95rem;
        }

        .status.success {
            background: rgba(46, 125, 50, 0.1);
            color: #2e7d32;
            border: 1px solid rgba(46, 125, 50, 0.2);
            display: block;
        }

        .status.error {
            background: rgba(198, 40, 40, 0.1);
            color: #c62828;
            border: 1px solid rgba(198, 40, 40, 0.2);
            display: block;
        }

        .link-section {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .link-section a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .link-section a:hover {
            color: var(--secondary);
            text-decoration: underline;
        }

        .back-link {
            text-align: left;
            margin-bottom: 25px;
        }

        .back-link a {
            color: var(--text-light);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: var(--primary);
        }

        .admin-login {
            text-align: center;
            margin-top: 30px;
            padding-top: 25px;
            border-top: 1px solid rgba(0, 0, 0, 0.05);
        }

        .admin-login p {
            margin-bottom: 12px;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .btn-admin {
            background: rgba(255, 152, 0, 0.1);
            color: #ff9800;
            border: 1px solid rgba(255, 152, 0, 0.3);
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
        }

        .btn-admin:hover {
            background: rgba(255, 152, 0, 0.2);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .header {
                padding: 30px 20px 15px;
            }

            .tabs {
                padding: 0 20px;
            }

            .tab-content {
                padding: 25px 20px 30px;
            }

            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="header-logo">
                    <i class="fas fa-gavel"></i>
                </div>
                <h1>Bhoomi</h1>
                <p>Digital Justice Platform</p>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('login')">
                    <i class="fas fa-sign-in-alt"></i> Login
                </button>
                <button class="tab-btn" onclick="switchTab('register')">
                    <i class="fas fa-user-plus"></i> Register
                </button>
            </div>

            <!-- Login Tab -->
            <div id="login" class="tab-content active">
                <div class="back-link">
                    <a href="/static/landing.html">
                        <i class="fas fa-arrow-left"></i> Back to Home
                    </a>
                </div>

                <div id="loginStatus" class="status"></div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="loginUsername">
                            <i class="fas fa-user"></i> Username or Email
                        </label>
                        <input type="text" id="loginUsername" placeholder="Enter username or email" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" id="loginPassword" placeholder="Enter password" required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>

                <div class="link-section">
                    <a href="/static/forgot-password.html">
                        <i class="fas fa-key"></i> Forgot Password?
                    </a>
                </div>

                <div class="admin-login">
                    <p><strong>Are you an administrator?</strong></p>
                    <button type="button" class="btn-admin" onclick="goToAdminLogin()">
                        <i class="fas fa-shield-alt"></i> Admin Login
                    </button>
                </div>
            </div>

            <!-- Register Tab -->
            <div id="register" class="tab-content">
                <div class="back-link">
                    <a href="/static/landing.html">
                        <i class="fas fa-arrow-left"></i> Back to Home
                    </a>
                </div>

                <div id="registerStatus" class="status"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="firstName">
                            <i class="fas fa-user"></i> First Name
                        </label>
                        <input type="text" id="firstName" placeholder="First name" required>
                    </div>

                    <div class="form-group">
                        <label for="lastName">
                            <i class="fas fa-user"></i> Last Name
                        </label>
                        <input type="text" id="lastName" placeholder="Last name" required>
                    </div>

                    <div class="form-group">
                        <label for="contactNumber">
                            <i class="fas fa-phone"></i> Contact Number
                        </label>
                        <input type="tel" id="contactNumber" placeholder="10-digit phone number" pattern="[0-9]{10}"
                            required>
                    </div>

                    <div class="form-group">
                        <label for="userType">
                            <i class="fas fa-id-badge"></i> Role
                        </label>
                        <select id="userType" required>
                            <option value="citizen" selected>Citizen</option>
                            <option value="lawyer">Lawyer</option>
                            <option value="official">Higher Official</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">
                            <i class="fas fa-envelope"></i> Email Address
                        </label>
                        <input type="email" id="registerEmail" placeholder="Enter email" required>
                    </div>

                    <div class="form-group">
                        <label for="registerUsername">
                            <i class="fas fa-at"></i> Username
                        </label>
                        <input type="text" id="registerUsername" placeholder="Choose username" required>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" id="registerPassword"
                            placeholder="Create password (min 6 chars, letters + numbers)" required>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">
                            <i class="fas fa-lock"></i> Confirm Password
                        </label>
                        <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-user-plus"></i> Create Account
                    </button>

                    <div
                        style="background: #e8f5e9; color: #2e7d32; padding: 12px; margin-top: 15px; border-radius: 6px; font-size: 0.9rem;">
                        <i class="fas fa-info-circle"></i> <strong>Next Step:</strong> Check your email for verification
                        link after registration.
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        // Tab switching
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => {
                el.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(el => {
                el.classList.remove('active');
            });
            document.getElementById(tab).classList.add('active');
            event.target.closest('.tab-btn').classList.add('active');
        }

        // Admin login
        function goToAdminLogin() {
            window.location.href = '/static/admin-login.html';
        }

        // Login form
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;
            const status = document.getElementById('loginStatus');

            try {
                const response = await fetch('/api/v1/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('user_token', data.token);
                    localStorage.setItem('user_data', JSON.stringify(data.user));
                    status.className = 'status success';
                    status.textContent = '✓ Login successful! Redirecting...';
                    setTimeout(() => {
                        window.location.href = '/static/index.html';
                    }, 1000);
                } else {
                    status.className = 'status error';
                    const detail = data.detail || 'Login failed';

                    // Check if it's an email verification error
                    if (detail.includes('Email not verified')) {
                        status.textContent = '✗ ' + detail + ' Check your email and click the verification link, then try again.';
                    } else if (detail.includes('User not found')) {
                        status.textContent = '✗ Username not found. Please register first.';
                    } else if (detail.includes('Invalid password')) {
                        status.textContent = '✗ Invalid password. Please try again.';
                    } else {
                        status.textContent = '✗ ' + detail;
                    }
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = '✗ An error occurred';
            }
        });

        // Register form
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const firstName = document.getElementById('firstName').value;
            const lastName = document.getElementById('lastName').value;
            const email = document.getElementById('registerEmail').value;
            const contactNumber = document.getElementById('contactNumber').value;
            const userType = document.getElementById('userType').value;
            const username = document.getElementById('registerUsername').value;
            const password = document.getElementById('registerPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const status = document.getElementById('registerStatus');

            if (password !== confirmPassword) {
                status.className = 'status error';
                status.textContent = '✗ Passwords do not match';
                return;
            }

            try {
                const response = await fetch('/api/v1/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username,
                        email,
                        password,
                        first_name: firstName,
                        last_name: lastName,
                        contact_number: contactNumber,
                        user_type: userType
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    status.className = 'status success';
                    status.textContent = '✓ Registration successful! Verification email sent. Check your inbox.';
                    document.getElementById('registerForm').reset();
                    setTimeout(() => {
                        switchTab('login');
                    }, 2000);
                } else {
                    status.className = 'status error';
                    status.textContent = '✗ ' + (data.detail || 'Registration failed');
                }
            } catch (error) {
                status.className = 'status error';
                status.textContent = '✗ An error occurred';
            }
        });
    </script>
</body>

</html>
