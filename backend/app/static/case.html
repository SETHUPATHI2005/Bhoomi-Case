<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Detail - Bhoomi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: white;
            color: #667eea;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .back-button:hover {
            transform: translateX(-5px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            margin-bottom: 20px;
        }

        .case-title {
            font-size: 2rem;
            color: #333;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }

        .case-title-id {
            color: #667eea;
            font-family: 'Courier New', monospace;
        }

        .info-section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.3rem;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: #667eea;
            width: 25px;
        }

        .info-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .info-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .info-label {
            font-weight: 600;
            color: #667eea;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .info-value {
            color: #333;
            font-size: 1rem;
        }

        .status-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-ongoing {
            background: #fff3cd;
            color: #856404;
        }

        .status-closed {
            background: #d4edda;
            color: #155724;
        }

        .status-pending {
            background: #d1ecf1;
            color: #0c5460;
        }

        .parties-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .party-badge {
            background: #e8eaf6;
            color: #667eea;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 0.9rem;
        }

        .documents-section {
            margin-top: 30px;
        }

        .documents-list {
            list-style: none;
            margin-top: 15px;
        }

        .document-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .document-item:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
            transform: translateX(5px);
        }

        .document-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .document-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        .source-section {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-top: 30px;
        }

        .source-link {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .source-link:hover {
            text-decoration: underline;
        }

        .loading-state {
            text-align: center;
            padding: 60px 20px;
            color: white;
        }

        .loading-state i {
            font-size: 2rem;
            margin-bottom: 15px;
            animation: spin 1s linear infinite;
        }

        .error-state {
            background: white;
            border-radius: 15px;
            padding: 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .error-state i {
            font-size: 3rem;
            color: #c62828;
            margin-bottom: 15px;
        }

        .error-state p {
            color: #666;
            font-size: 1.1rem;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }

            .case-title {
                font-size: 1.5rem;
            }

            .info-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <a href="/" class="back-button">
            <i class="fas fa-arrow-left"></i> Back to Search
        </a>

        <div id="loading" class="loading-state">
            <i class="fas fa-spinner"></i>
            <p>Loading case details...</p>
        </div>

        <div id="error" style="display: none;">
            <div class="error-state">
                <i class="fas fa-exclamation-circle"></i>
                <p id="errorMessage">Failed to load case details. Please try again.</p>
            </div>
        </div>

        <div id="content" style="display: none;"></div>
    </div>

    <script>
        function getQueryParam(name) {
            const params = new URLSearchParams(window.location.search);
            return params.get(name);
        }

        function formatDate(dateStr) {
            if (!dateStr) return 'N/A';
            try {
                const date = new Date(dateStr);
                return date.toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });
            } catch {
                return dateStr;
            }
        }

        function getStatusBadge(status) {
            const statusLower = (status || '').toLowerCase();
            let badgeClass = 'status-pending';
            if (statusLower.includes('ongoing')) badgeClass = 'status-ongoing';
            else if (statusLower.includes('closed') || statusLower.includes('disposed')) badgeClass = 'status-closed';
            
            return `<span class="status-badge ${badgeClass}">${status}</span>`;
        }

        async function loadCase() {
            const caseId = getQueryParam('case_id') || getQueryParam('id');
            
            if (!caseId) {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('errorMessage').textContent = 'No case ID provided.';
                return;
            }

            try {
                const response = await fetch(`/api/v1/cases/${encodeURIComponent(caseId)}`);
                
                if (response.status === 404) {
                    document.getElementById('loading').style.display = 'none';
                    document.getElementById('error').style.display = 'block';
                    document.getElementById('errorMessage').textContent = 'Case not found.';
                    return;
                }

                if (!response.ok) {
                    throw new Error('Failed to fetch case');
                }

                const caseData = await response.json();
                displayCase(caseData);

            } catch (error) {
                console.error('Load error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
                document.getElementById('errorMessage').textContent = 'Error loading case details. Please try again.';
            }
        }

        function displayCase(caseData) {
            const contentDiv = document.getElementById('content');
            
            let html = `
                <div class="card">
                    <h1 class="case-title">
                        <span class="case-title-id">${caseData.case_id || 'N/A'}</span>
                    </h1>

                    <div class="info-section">
                        <div class="info-row">
                            <div class="info-item">
                                <div class="info-label"><i class="fas fa-building"></i> Court</div>
                                <div class="info-value">${caseData.court || 'N/A'}</div>
                            </div>
                            <div class="info-item">
                                <div class="info-label"><i class="fas fa-hourglass-half"></i> Status</div>
                                <div class="info-value">${getStatusBadge(caseData.status)}</div>
                            </div>
                        </div>
                    </div>
            `;

            if (caseData.parties && caseData.parties.length) {
                html += `
                    <div class="info-section">
                        <div class="section-title">
                            <i class="fas fa-users"></i> Parties
                        </div>
                        <div class="parties-list">
                            ${caseData.parties.map(p => `<span class="party-badge">${p}</span>`).join('')}
                        </div>
                    </div>
                `;
            }

            if (caseData.filed_date || caseData.last_hearing_date) {
                html += `
                    <div class="info-section">
                        <div class="section-title">
                            <i class="fas fa-calendar-alt"></i> Timeline
                        </div>
                        <div class="info-row">
                            ${caseData.filed_date ? `
                                <div class="info-item">
                                    <div class="info-label">Filed Date</div>
                                    <div class="info-value">${formatDate(caseData.filed_date)}</div>
                                </div>
                            ` : ''}
                            ${caseData.last_hearing_date ? `
                                <div class="info-item">
                                    <div class="info-label">Last Hearing</div>
                                    <div class="info-value">${formatDate(caseData.last_hearing_date)}</div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            }

            if (caseData.documents && caseData.documents.length) {
                html += `
                    <div class="documents-section">
                        <div class="section-title">
                            <i class="fas fa-file-pdf"></i> Documents
                        </div>
                        <ul class="documents-list">
                            ${caseData.documents.map(doc => `
                                <li class="document-item">
                                    <a href="${doc.url}" target="_blank" rel="noopener noreferrer" class="document-link">
                                        <i class="fas fa-download"></i> ${doc.title || doc.url}
                                    </a>
                                </li>
                            `).join('')}
                        </ul>
                    </div>
                `;
            }

            if (caseData.source) {
                html += `
                    <div class="source-section">
                        <strong>📌 Source Information</strong><br>
                        <a href="${caseData.source.url}" target="_blank" rel="noopener noreferrer" class="source-link">
                            ${caseData.source.name}
                        </a>
                        <br>
                        <small style="color: #666;">Retrieved on ${formatDate(caseData.source.retrieved_at)}</small>
                    </div>
                `;
            }

            html += '</div>';

            contentDiv.innerHTML = html;
            document.getElementById('loading').style.display = 'none';
            contentDiv.style.display = 'block';
        }

        // Load case on page load
        loadCase();
    </script>
</body>
</html>
