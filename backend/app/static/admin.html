<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Bhoomi</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px 40px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .header p {
            opacity: 0.95;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .token-section {
            background: #f0f4ff;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .token-section label {
            font-weight: 600;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }

        .token-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
        }

        .token-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 0.95rem;
        }

        input[type="text"],
        input[type="number"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 250px;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        .btn-upload {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-upload:active {
            transform: translateY(0);
        }

        .btn-cancel {
            background: #f0f0f0;
            color: #666;
        }

        .btn-cancel:hover {
            background: #e0e0e0;
        }

        .status {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.loading {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .example-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            color: #666;
        }

        .example-box code {
            background: #e8eaf6;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            color: #667eea;
        }

        .back-link {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .back-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .back-link a:hover {
            color: #764ba2;
        }

        .info-badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
        }

        .tab-button.active {
            background: #667eea !important;
        }

        .tab-button:hover {
            background: #764ba2 !important;
        }

        .user-item {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }

        .user-info {
            flex: 1;
        }

        .user-info h4 {
            margin: 0 0 5px 0;
            color: #333;
        }

        .user-info p {
            margin: 2px 0;
            color: #666;
            font-size: 0.9rem;
        }

        .user-actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-verify {
            background: #4caf50;
            color: white;
        }

        .btn-verify:hover {
            background: #45a049;
        }

        .btn-reject {
            background: #ff9800;
            color: white;
        }

        .btn-reject:hover {
            background: #f57c00;
        }

        .btn-reset {
            background: #2196f3;
            color: white;
        }

        .btn-reset:hover {
            background: #1976d2;
        }

        .btn-details {
            background: #9c27b0;
            color: white;
        }

        .btn-details:hover {
            background: #7b1fa2;
        }

        .btn-delete-user {
            background: #f44336;
            color: white;
        }

        .btn-delete-user:hover {
            background: #d32f2f;
        }

        .verification-badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-verified {
            background: #4caf50;
            color: white;
        }

        .badge-pending {
            background: #ff9800;
            color: white;
        }

        .badge-rejected {
            background: #f44336;
            color: white;
        }

        .user-details-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .detail-item {
            background: #f5f5f5;
            padding: 10px;
            border-radius: 6px;
        }

        .detail-item strong {
            color: #333;
        }

        .detail-item span {
            color: #666;
        }

        .password-hash {
            font-family: 'Courier New', monospace;
            background: #e8eaf6;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8rem;
        }

        .case-info strong {
            color: #667eea;
            display: block;
            margin-bottom: 5px;
        }

        .case-info small {
            color: #666;
            display: block;
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .case-actions {
            display: flex;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-small {
            padding: 8px 12px;
            font-size: 0.85rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .btn-edit {
            background: #2196F3;
            color: white;
        }

        .btn-edit:hover {
            background: #1976D2;
        }

        .btn-delete {
            background: #f44336;
            color: white;
        }

        .btn-delete:hover {
            background: #d32f2f;
        }

        @media (max-width: 600px) {
            .card {
                padding: 20px;
            }

            .button-group {
                flex-direction: column;
            }

            textarea {
                min-height: 200px;
            }
        }
    </style>
</head>

<body>
    <script>
        (function () {
            try {
                const token = localStorage.getItem('user_token') || sessionStorage.getItem('user_token');
                const userDataStr = localStorage.getItem('user_data') || sessionStorage.getItem('user_data');

                if (!token || !userDataStr) {
                    window.location.replace('/static/admin-login.html');
                    return;
                }

                const userData = JSON.parse(userDataStr);
                if (userData.user_type !== 'admin' && userData.user_type !== 'official') {
                    window.location.replace('/');
                    return;
                }
            } catch (e) {
                window.location.replace('/');
            }
        })();
    </script>
    <div id="adminAppContainer" class="container" style="max-width: 1000px;">
        <div class="header">
            <div style="display: flex; align-items: center; gap: 20px;">
                <button id="menuBtn"
                    style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; padding: 5px;">
                    <i class="fas fa-bars"></i>
                </button>
            </div>
            <div style="flex: 1; text-align: center;">
                <h1 style="margin: 0; color: white;"><i class="fas fa-lock"></i> Admin Panel</h1>
                <p style="margin: 0; opacity: 0.8; font-size: 0.9rem;">Upload court case and parcel data</p>
            </div>
            <div class="header-right">
                <a href="#" id="headerLogoutBtn"
                    style="background: #f44336; color: white; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;">
                    <i class="fas fa-sign-out-alt"></i> Logout
                </a>
            </div>
        </div>

        <div class="card">
            <div class="example-box">
                <form id="uploadForm">
                    <div class="example-box">
                        <i class="fas fa-info-circle"></i>
                        <strong>Admin Console:</strong> Manage records and documents with secure access.
                    </div>

                    <div class="form-group">
                        <label for="village_field">Village Name</label>
                        <input type="text" id="village_field" placeholder="e.g. VerificationVillage" required>
                    </div>

                    <div class="form-group">
                        <label for="survey_number_field">Survey Number</label>
                        <input type="text" id="survey_number_field" placeholder="e.g. V-999" required>
                    </div>

                    <div class="form-group">
                        <label for="property_type_field">Property Type</label>
                        <input type="text" id="property_type_field" placeholder="e.g. Agricultural Land">
                    </div>

                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px;">
                        <div class="form-group">
                            <label for="case_doc_field"><i class="fas fa-file-pdf"></i> Case Document</label>
                            <input type="file" id="case_doc_field" class="token-input" style="font-family: inherit;">
                        </div>
                        <div class="form-group">
                            <label for="fir_doc_field"><i class="fas fa-file-invoice"></i> FIR Document</label>
                            <input type="file" id="fir_doc_field" class="token-input" style="font-family: inherit;">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="land_doc_field"><i class="fas fa-file-contract"></i> Land Document</label>
                        <input type="file" id="land_doc_field" class="token-input" style="font-family: inherit;">
                    </div>

                    <div class="form-group">
                        <label for="payload">
                            <i class="fas fa-file-code"></i> Extended Data (Optional JSON)
                        </label>
                        <textarea id="payload" placeholder='{"area_sqft": 5000, ...}'
                            style="min-height: 100px;">{}</textarea>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-upload">
                            <i class="fas fa-cloud-upload-alt"></i> Upload Record
                        </button>
                        <button type="reset" class="btn-cancel">
                            <i class="fas fa-redo"></i> Reset
                        </button>
                    </div>
                </form>

                <div id="status" class="status"></div>

                <!-- Case Management Section -->
                <div style="border-top: 2px solid #e0e0e0; margin: 40px 0; padding-top: 30px;">
                    <div
                        style="display: flex; gap: 20px; margin-bottom: 30px; justify-content: center; flex-wrap: wrap;">
                        <button id="casesMgmtTab" class="tab-button active"
                            style="padding: 10px 25px; border: none; border-radius: 8px; background: #667eea; color: white; cursor: pointer; font-weight: 600; transition: all 0.3s;">
                            <i class="fas fa-cases"></i> Manage Cases
                        </button>
                        <button id="usersMgmtTab" class="tab-button"
                            style="padding: 10px 25px; border: none; border-radius: 8px; background: #999; color: white; cursor: pointer; font-weight: 600; transition: all 0.3s;">
                            <i class="fas fa-users"></i> Manage Users
                        </button>
                    </div>

                    <!-- Cases Management Tab -->
                    <div id="casesMgmtPanel">
                        <h2 style="color: #333; margin-bottom: 20px; text-align: center;">
                            <i class="fas fa-cases"></i> Manage Cases
                        </h2>

                        <button id="loadCasesBtn" class="btn-upload" style="width: 100%; margin-bottom: 20px;">
                            <i class="fas fa-sync-alt"></i> Load All Cases
                        </button>

                        <div id="casesContainer" style="display: none;">
                            <div id="casesList" style="margin-bottom: 20px;"></div>
                        </div>

                        <div id="editCaseModal"
                            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; padding: 20px;">
                            <div
                                style="background: white; margin: 50px auto; padding: 30px; border-radius: 15px; max-width: 600px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
                                <h3 style="margin-bottom: 20px; color: #333;">
                                    <i class="fas fa-edit"></i> Edit Case
                                </h3>
                                <textarea id="editCaseJSON"
                                    style="width: 100%; height: 300px; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-family: 'Courier New', monospace; resize: vertical;"></textarea>
                                <div class="button-group" style="margin-top: 20px;">
                                    <button id="saveCaseBtn" class="btn-upload">
                                        <i class="fas fa-save"></i> Save Changes
                                    </button>
                                    <button id="closeEditBtn" class="btn-cancel">
                                        <i class="fas fa-times"></i> Cancel
                                    </button>
                                </div>
                                <div id="editStatus" class="status" style="margin-top: 15px;"></div>
                            </div>
                        </div>
                    </div>

                    <!-- Users Management Tab -->
                    <div id="usersMgmtPanel" style="display: none;">
                        <h2 style="color: #333; margin-bottom: 20px; text-align: center;">
                            <i class="fas fa-users"></i> Manage Users
                        </h2>

                        <button id="loadUsersBtn" class="btn-upload" style="width: 100%; margin-bottom: 20px;">
                            <i class="fas fa-sync-alt"></i> Load All Users
                        </button>

                        <div id="usersContainer" style="display: none;">
                            <div id="usersList" style="margin-bottom: 20px;"></div>
                        </div>

                        <!-- User Details Modal -->
                        <div id="userDetailsModal"
                            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; padding: 20px;">
                            <div
                                style="background: white; margin: 50px auto; padding: 30px; border-radius: 15px; max-width: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
                                <h3 style="margin-bottom: 20px; color: #333;">
                                    <i class="fas fa-user"></i> User Details
                                </h3>
                                <div id="userDetailsContent"></div>
                                <div class="button-group" style="margin-top: 20px;">
                                    <button id="closeUserDetailsBtn" class="btn-cancel">
                                        <i class="fas fa-times"></i> Close
                                    </button>
                                </div>
                            </div>
                        </div>

                        <!-- Reset Password Modal -->
                        <div id="resetPasswordModal"
                            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; padding: 20px;">
                            <div
                                style="background: white; margin: 50px auto; padding: 30px; border-radius: 15px; max-width: 400px; box-shadow: 0 10px 40px rgba(0,0,0,0.3);">
                                <h3 style="margin-bottom: 20px; color: #333;">
                                    <i class="fas fa-key"></i> Reset Password
                                </h3>
                                <div id="resetPasswordContent"></div>
                                <div class="button-group" style="margin-top: 20px;">
                                    <button id="confirmResetBtn" class="btn-upload">
                                        <i class="fas fa-save"></i> Reset Password
                                    </button>
                                    <button id="closeResetPasswordBtn" class="btn-cancel">
                                        <i class="fas fa-times"></i> Cancel
                                    </button>
                                </div>
                                <div id="resetStatus" class="status" style="margin-top: 15px;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="back-link">
                    <a href="/">
                        <i class="fas fa-arrow-left"></i> Back to Search
                    </a>
                </div>
            </div>
        </div>

        <!-- Sidebar Menu -->
        <div id="sidebar"
            style="position: fixed; top: 0; left: -300px; width: 300px; height: 100%; background: white; box-shadow: 2px 0 10px rgba(0,0,0,0.2); transition: all 0.3s ease; z-index: 2000; padding: 30px;">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 2px solid #f0f0f0; padding-bottom: 20px;">
                <h2 style="color: #667eea;"><i class="fas fa-gavel"></i> Bhoomi</h2>
                <button id="closeMenuBtn"
                    style="background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #666;">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <nav style="display: flex; flex-direction: column; gap: 20px;">
                <a href="/static/index.html"
                    style="text-decoration: none; color: #333; font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px;">
                    <i class="fas fa-search" style="color: #667eea; width: 20px;"></i> Search Case
                </a>
                <a href="/static/dashboard.html"
                    style="text-decoration: none; color: #333; font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px;">
                    <i class="fas fa-home" style="color: #667eea; width: 20px;"></i> Dashboard
                </a>
                <a href="/static/admin.html"
                    style="text-decoration: none; color: #667eea; font-weight: 600; font-size: 1.1rem; display: flex; align-items: center; gap: 12px; padding: 10px; border-radius: 8px; background: #f0f4ff;">
                    <i class="fas fa-lock" style="width: 20px;"></i> Admin Panel
                </a>
            </nav>
        </div>
        <div id="sidebarOverlay"
            style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1999;">
        </div>

        <script>
            const uploadForm = document.getElementById('uploadForm');
            const tokenInput = document.getElementById('token');
            const payloadInput = document.getElementById('payload');
            const statusDiv = document.getElementById('status');

            function showStatus(message, type) {
                statusDiv.textContent = message;
                statusDiv.className = `status show ${type}`;
            }

            uploadForm.addEventListener('submit', async (e) => {
                e.preventDefault();

                const village = document.getElementById('village_field').value.trim();
                const survey = document.getElementById('survey_number_field').value.trim();
                const propertyType = document.getElementById('property_type_field').value.trim() || "Unknown";
                const payloadRaw = payloadInput.value.trim() || "{}";

                const formData = new FormData();
                formData.append('village', village);
                formData.append('survey_number', survey);
                formData.append('property_type', propertyType);
                formData.append('payload_json', payloadRaw);

                const caseFile = document.getElementById('case_doc_field').files[0];
                const firFile = document.getElementById('fir_doc_field').files[0];
                const landFile = document.getElementById('land_doc_field').files[0];

                if (caseFile) formData.append('case_doc', caseFile);
                if (firFile) formData.append('fir_doc', firFile);
                if (landFile) formData.append('land_doc', landFile);

                showStatus('⏳ Uploading multipart data...', 'loading');

                const token = localStorage.getItem('user_token');
                if (!token) {
                    showStatus('❌ Session expired. Please login again.', 'error');
                    setTimeout(() => window.location.href = '/static/admin-login.html', 1500);
                    return;
                }

                try {
                    const response = await fetch('/api/v1/admin/upload-multipart', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        },
                        body: formData
                    });

                    const result = await response.json();

                    if (response.ok) {
                        showStatus('✅ Upload successful! Record for "' + village + '" added.', 'success');
                        uploadForm.reset();
                    } else if (response.status === 401 || response.status === 403) {
                        showStatus('❌ Unauthorized: Invalid admin token', 'error');
                    } else {
                        showStatus('❌ Upload failed: ' + (result.detail || 'Server error'), 'error');
                    }
                } catch (error) {
                    showStatus('❌ Network error: ' + error.message, 'error');
                    console.error('Upload error:', error);
                }
            });


            // Sidebar Logic
            const menuBtn = document.getElementById('menuBtn');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            const closeMenuBtn = document.getElementById('closeMenuBtn');

            menuBtn.onclick = () => {
                sidebar.style.left = '0';
                overlay.style.display = 'block';
            };

            const close = () => {
                sidebar.style.left = '-300px';
                overlay.style.display = 'none';
            };

            closeMenuBtn.onclick = close;
            overlay.onclick = close;

            // Initialize
            document.getElementById('village_field').focus();

            document.getElementById('headerLogoutBtn').onclick = (e) => {
                e.preventDefault();
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = '/';
            };

            // Case Management Functions
            let currentCaseId = null;
            const loadCasesBtn = document.getElementById('loadCasesBtn');
            const casesContainer = document.getElementById('casesContainer');
            const casesList = document.getElementById('casesList');
            const editCaseModal = document.getElementById('editCaseModal');
            const editCaseJSON = document.getElementById('editCaseJSON');
            const saveCaseBtn = document.getElementById('saveCaseBtn');
            const closeEditBtn = document.getElementById('closeEditBtn');
            const editStatus = document.getElementById('editStatus');

            function showEditStatus(msg, type) {
                editStatus.textContent = msg;
                editStatus.className = 'status show ' + type;
                setTimeout(() => {
                    editStatus.classList.remove('show');
                }, 5000);
            }

            loadCasesBtn.addEventListener('click', async () => {
                const token = localStorage.getItem('user_token');
                if (!token) {
                    showStatus('❌ Session expired. Please login again.', 'error');
                    return;
                }

                loadCasesBtn.disabled = true;
                loadCasesBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';

                try {
                    const response = await fetch('/api/v1/admin/cases', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.status === 200) {
                        const data = await response.json();
                        displayCases(data.cases, token);
                        casesContainer.style.display = 'block';
                    } else if (response.status === 401 || response.status === 403) {
                        showStatus('❌ Session expired or unauthorized. Please login again.', 'error');
                    } else {
                        showStatus('❌ Failed to load cases', 'error');
                    }
                } catch (error) {
                    showStatus('❌ Error loading cases: ' + error.message, 'error');
                } finally {
                    loadCasesBtn.disabled = false;
                    loadCasesBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Load All Cases';
                }
            });

            function displayCases(cases, token) {
                if (cases.length === 0) {
                    casesList.innerHTML = '<p style="text-align: center; color: #999; padding: 20px;">No cases found.</p>';
                    return;
                }

                casesList.innerHTML = cases.map(caseItem => `
                <div class="case-item">
                    <div class="case-info">
                        <strong>${caseItem.case_id}</strong>
                        <small>
                            <strong>Village:</strong> ${caseItem.village} | <strong>Survey:</strong> ${caseItem.survey_number}<br>
                            <strong>Court:</strong> ${caseItem.court}<br>
                            <strong>Type:</strong> ${caseItem.case_type} | <strong>Status:</strong> <span style="color: ${caseItem.status === 'ongoing' ? '#ff9800' : '#4caf50'}">${caseItem.status}</span>
                        </small>
                    </div>
                    <div class="case-actions">
                        <button class="btn-small btn-edit" onclick="editCase('${caseItem.case_id}')">
                            <i class="fas fa-edit"></i> Edit
                        </button>
                        <button class="btn-small btn-delete" onclick="deleteCase('${caseItem.case_id}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                </div>
            `).join('');
            }

            window.editCase = async function (caseId, token) {
                currentCaseId = caseId;
                try {
                    const response = await fetch(`/api/v1/cases/${encodeURIComponent(caseId)}`);
                    if (response.status === 200) {
                        const caseData = await response.json();
                        editCaseJSON.value = JSON.stringify(caseData, null, 2);
                        editCaseModal.style.display = 'flex';
                    } else {
                        showEditStatus('❌ Failed to load case', 'error');
                    }
                } catch (error) {
                    showEditStatus('❌ Error: ' + error.message, 'error');
                }
            };

            window.deleteCase = async function (caseId) {
                if (!confirm(`Are you sure you want to delete case ${caseId}? This cannot be undone.`)) {
                    return;
                }

                const token = localStorage.getItem('user_token');
                try {
                    const response = await fetch(`/api/v1/admin/cases/${encodeURIComponent(caseId)}`, {
                        method: 'DELETE',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.status === 200) {
                        showStatus('✅ Case deleted successfully!', 'success');
                        setTimeout(() => {
                            loadCasesBtn.click(); // Reload cases
                        }, 1000);
                    } else {
                        const result = await response.json();
                        showStatus('❌ Delete failed: ' + (result.detail || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    showStatus('❌ Error: ' + error.message, 'error');
                }
            };

            saveCaseBtn.addEventListener('click', async () => {
                const token = localStorage.getItem('user_token');
                try {
                    const updatedData = JSON.parse(editCaseJSON.value);
                    saveCaseBtn.disabled = true;
                    saveCaseBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';

                    const response = await fetch(`/api/v1/admin/cases/${encodeURIComponent(currentCaseId)}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify(updatedData)
                    });

                    if (response.status === 200) {
                        showEditStatus('✅ Case updated successfully!', 'success');
                        setTimeout(() => {
                            editCaseModal.style.display = 'none';
                            loadCasesBtn.click();
                        }, 800);
                    } else {
                        const result = await response.json();
                        showEditStatus('❌ Update failed: ' + (result.detail || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    showEditStatus('❌ ' + error.message, 'error');
                } finally {
                    saveCaseBtn.disabled = false;
                    saveCaseBtn.innerHTML = '<i class="fas fa-save"></i> Save Changes';
                }
            });

            closeEditBtn.addEventListener('click', () => {
                editCaseModal.style.display = 'none';
            });

            // Tab switching functionality
            const casesMgmtTab = document.getElementById('casesMgmtTab');
            const usersMgmtTab = document.getElementById('usersMgmtTab');
            const casesMgmtPanel = document.getElementById('casesMgmtPanel');
            const usersMgmtPanel = document.getElementById('usersMgmtPanel');

            casesMgmtTab.addEventListener('click', () => {
                casesMgmtTab.classList.add('active');
                usersMgmtTab.classList.remove('active');
                casesMgmtPanel.style.display = 'block';
                usersMgmtPanel.style.display = 'none';
            });

            usersMgmtTab.addEventListener('click', () => {
                usersMgmtTab.classList.add('active');
                casesMgmtTab.classList.remove('active');
                usersMgmtPanel.style.display = 'block';
                casesMgmtPanel.style.display = 'none';
            });

            // User management functionality
            const loadUsersBtn = document.getElementById('loadUsersBtn');
            const usersContainer = document.getElementById('usersContainer');
            const usersList = document.getElementById('usersList');
            const userDetailsModal = document.getElementById('userDetailsModal');
            const userDetailsContent = document.getElementById('userDetailsContent');
            const closeUserDetailsBtn = document.getElementById('closeUserDetailsBtn');
            const resetPasswordModal = document.getElementById('resetPasswordModal');
            const resetPasswordContent = document.getElementById('resetPasswordContent');
            const confirmResetBtn = document.getElementById('confirmResetBtn');
            const closeResetPasswordBtn = document.getElementById('closeResetPasswordBtn');
            const resetStatus = document.getElementById('resetStatus');

            let currentResetUsername = '';

            loadUsersBtn.addEventListener('click', async () => {
                const token = localStorage.getItem('user_token');
                if (!token) {
                    showStatus('❌ Session expired. Please login again.', 'error');
                    return;
                }

                loadUsersBtn.disabled = true;
                loadUsersBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Loading...';

                try {
                    const response = await fetch('/api/v1/admin/users', {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        const data = await response.json();
                        displayUsers(data.users);
                        usersContainer.style.display = 'block';
                        showStatus(`Loaded ${data.count} users successfully!`, 'success');
                    } else {
                        const error = await response.json();
                        showStatus('Failed to load users: ' + (error.detail || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    showStatus('Error loading users: ' + error.message, 'error');
                } finally {
                    loadUsersBtn.disabled = false;
                    loadUsersBtn.innerHTML = '<i class="fas fa-sync-alt"></i> Load All Users';
                }
            });

            function displayUsers(users) {
                usersList.innerHTML = '';

                if (users.length === 0) {
                    usersList.innerHTML = '<p style="text-align: center; color: #666; padding: 20px;">No users found.</p>';
                    return;
                }

                users.forEach(user => {
                    const userItem = document.createElement('div');
                    userItem.className = 'user-item';

                    const verified = user.verified ? 'verified' : 'pending';
                    const badgeClass = verified === 'verified' ? 'badge-verified' : 'badge-pending';
                    const badgeText = verified === 'verified' ? 'Verified' : 'Pending';

                    userItem.innerHTML = `
                    <div class="user-info">
                        <h4>${user.first_name} ${user.last_name} <span class="verification-badge ${badgeClass}">${badgeText}</span></h4>
                        <p><strong>Username:</strong> ${user.username}</p>
                        <p><strong>Email:</strong> ${user.email}</p>
                        <p><strong>Type:</strong> ${user.user_type}</p>
                        <p><strong>Joined:</strong> ${new Date(user.created_at).toLocaleDateString()}</p>
                    </div>
                    <div class="user-actions">
                        <button class="btn-small btn-details" onclick="viewUserDetails('${user.username}')">
                            <i class="fas fa-eye"></i> Details
                        </button>
                        ${!user.verified ? `
                            <button class="btn-small btn-verify" onclick="verifyUser('${user.username}')">
                                <i class="fas fa-check"></i> Verify
                            </button>
                            <button class="btn-small btn-reject" onclick="rejectUser('${user.username}')">
                                <i class="fas fa-times"></i> Reject
                            </button>
                        ` : ''}
                        <button class="btn-small btn-reset" onclick="showResetPassword('${user.username}')">
                            <i class="fas fa-key"></i> Reset PW
                        </button>
                        <button class="btn-small btn-delete-user" onclick="deleteUser('${user.username}')">
                            <i class="fas fa-trash"></i> Delete
                        </button>
                    </div>
                `;

                    usersList.appendChild(userItem);
                });
            }

            // Global functions for user actions
            window.viewUserDetails = async function (username) {
                const token = localStorage.getItem('user_token');
                try {
                    const response = await fetch(`/api/v1/admin/users/${username}`, {
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        const user = await response.json();
                        displayUserDetails(user);
                        userDetailsModal.style.display = 'flex';
                    } else {
                        const error = await response.json();
                        showStatus('Failed to load user details: ' + (error.detail || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    showStatus('Error loading user details: ' + error.message, 'error');
                }
            };

            window.verifyUser = async function (username) {
                if (!confirm(`Are you sure you want to verify user "${username}"?`)) return;

                const token = localStorage.getItem('user_token');
                try {
                    const response = await fetch(`/api/v1/admin/users/${username}/verify`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        showStatus(`User "${username}" verified successfully!`, 'success');
                        loadUsersBtn.click();
                    } else {
                        const error = await response.json();
                        showStatus('Failed to verify user: ' + (error.detail || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    showStatus('Error verifying user: ' + error.message, 'error');
                }
            };

            window.rejectUser = async function (username) {
                if (!confirm(`Are you sure you want to reject user "${username}"?`)) return;

                const token = localStorage.getItem('user_token');
                try {
                    const response = await fetch(`/api/v1/admin/users/${username}/reject`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        showStatus(`User "${username}" rejected.`, 'success');
                        loadUsersBtn.click();
                    } else {
                        const error = await response.json();
                        showStatus('Failed to reject user: ' + (error.detail || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    showStatus('Error rejecting user: ' + error.message, 'error');
                }
            };

            window.showResetPassword = function (username) {
                currentResetUsername = username;
                resetPasswordContent.innerHTML = `
                <p>Reset password for user: <strong>${username}</strong></p>
                <input type="password" id="newPassword" placeholder="Enter new password" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px;" required>
                <input type="password" id="confirmNewPassword" placeholder="Confirm new password" style="width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px;" required>
            `;
                resetPasswordModal.style.display = 'flex';
            };

            window.deleteUser = async function (username) {
                if (!confirm(`Are you sure you want to permanently delete user "${username}"? This action cannot be undone!`)) return;

                const token = localStorage.getItem('user_token');
                try {
                    const response = await fetch(`/api/v1/admin/users/${username}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${token}`
                        }
                    });

                    if (response.ok) {
                        showStatus(`User "${username}" deleted successfully!`, 'success');
                        loadUsersBtn.click();
                    } else {
                        const error = await response.json();
                        showStatus('Failed to delete user: ' + (error.detail || 'Unknown error'), 'error');
                    }
                } catch (error) {
                    showStatus('Error deleting user: ' + error.message, 'error');
                }
            };

            function displayUserDetails(user) {
                userDetailsContent.innerHTML = `
                <div class="user-details-grid">
                    <div class="detail-item">
                        <strong>Username:</strong><br>
                        <span>${user.username}</span>
                    </div>
                    <div class="detail-item">
                        <strong>Email:</strong><br>
                        <span>${user.email}</span>
                    </div>
                    <div class="detail-item">
                        <strong>First Name:</strong><br>
                        <span>${user.first_name}</span>
                    </div>
                    <div class="detail-item">
                        <strong>Last Name:</strong><br>
                        <span>${user.last_name}</span>
                    </div>
                    <div class="detail-item">
                        <strong>User Type:</strong><br>
                        <span>${user.user_type}</span>
                    </div>
                    <div class="detail-item">
                        <strong>Verification Status:</strong><br>
                        <span class="verification-badge ${user.verified ? 'badge-verified' : 'badge-pending'}">${user.verified ? 'Verified' : 'Pending'}</span>
                    </div>
                    <div class="detail-item">
                        <strong>Created:</strong><br>
                        <span>${new Date(user.created_at).toLocaleString()}</span>
                    </div>
                    <div class="detail-item">
                        <strong>Updated:</strong><br>
                        <span>${new Date(user.updated_at).toLocaleString()}</span>
                    </div>
                    ${user.verified_at ? `
                        <div class="detail-item">
                            <strong>Verified At:</strong><br>
                            <span>${new Date(user.verified_at).toLocaleString()}</span>
                        </div>
                    ` : ''}
                    ${user.verified_by ? `
                        <div class="detail-item">
                            <strong>Verified By:</strong><br>
                            <span>${user.verified_by}</span>
                        </div>
                    ` : ''}
                </div>
                <div class="detail-item" style="grid-column: 1 / -1;">
                    <strong>Password Hash:</strong><br>
                    <span class="password-hash">${user.password}</span>
                </div>
            `;
            }

            closeUserDetailsBtn.addEventListener('click', () => {
                userDetailsModal.style.display = 'none';
            });

            confirmResetBtn.addEventListener('click', async () => {
                const newPassword = document.getElementById('newPassword').value;
                const confirmPassword = document.getElementById('confirmNewPassword').value;
                const token = localStorage.getItem('user_token');

                if (!newPassword || !confirmPassword) {
                    resetStatus.textContent = 'Please fill in both password fields';
                    resetStatus.className = 'status error show';
                    return;
                }

                if (newPassword !== confirmPassword) {
                    resetStatus.textContent = 'Passwords do not match';
                    resetStatus.className = 'status error show';
                    return;
                }

                if (newPassword.length < 6) {
                    resetStatus.textContent = 'Password must be at least 6 characters';
                    resetStatus.className = 'status error show';
                    return;
                }

                confirmResetBtn.disabled = true;
                confirmResetBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Resetting...';

                try {
                    const response = await fetch(`/api/v1/admin/users/${currentResetUsername}/reset-password`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({ password: newPassword })
                    });

                    if (response.ok) {
                        resetStatus.textContent = 'Password reset successfully!';
                        resetStatus.className = 'status success show';
                        setTimeout(() => {
                            resetPasswordModal.style.display = 'none';
                            resetStatus.className = 'status';
                        }, 2000);
                    } else {
                        const error = await response.json();
                        resetStatus.textContent = 'Failed to reset password: ' + (error.detail || 'Unknown error');
                        resetStatus.className = 'status error show';
                    }
                } catch (error) {
                    resetStatus.textContent = 'Error resetting password: ' + error.message;
                    resetStatus.className = 'status error show';
                } finally {
                    confirmResetBtn.disabled = false;
                    confirmResetBtn.innerHTML = '<i class="fas fa-save"></i> Reset Password';
                }
            });

            closeResetPasswordBtn.addEventListener('click', () => {
                resetPasswordModal.style.display = 'none';
                resetStatus.className = 'status';
            });

            // Modal close on outside click
            userDetailsModal.addEventListener('click', (e) => {
                if (e.target === userDetailsModal) {
                    userDetailsModal.style.display = 'none';
                }
            });

            resetPasswordModal.addEventListener('click', (e) => {
                if (e.target === resetPasswordModal) {
                    resetPasswordModal.style.display = 'none';
                    resetStatus.className = 'status';
                }
            });
        </script>
</body>

</html>
