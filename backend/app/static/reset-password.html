<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Bhoomi Land Cases</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #2c3e50;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            color: #7f8c8d;
            font-size: 14px;
        }

        .icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ecf0f1;
            border-radius: 50%;
            font-size: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 6px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .password-strength {
            display: none;
            margin-top: 8px;
            font-size: 12px;
            padding: 8px;
            border-radius: 4px;
        }

        .password-strength.weak {
            display: block;
            background: #ffe0e0;
            color: #d32f2f;
        }

        .password-strength.medium {
            display: block;
            background: #fff3cd;
            color: #856404;
        }

        .password-strength.strong {
            display: block;
            background: #d4edda;
            color: #155724;
        }

        .requirements {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            border-radius: 4px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #555;
        }

        .requirement {
            display: flex;
            align-items: center;
            margin: 8px 0;
        }

        .requirement-check {
            display: inline-block;
            width: 20px;
            height: 20px;
            margin-right: 10px;
            border-radius: 50%;
            background: #ecf0f1;
            text-align: center;
            line-height: 20px;
            font-size: 12px;
            color: #7f8c8d;
        }

        .requirement.met .requirement-check {
            background: #27ae60;
            color: white;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .alert.loading {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .button:hover:not(:disabled) {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .button:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button.loading {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .footer {
            text-align: center;
            color: #7f8c8d;
            font-size: 13px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }

        .footer a {
            color: #667eea;
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        .form-group small {
            display: block;
            margin-top: 5px;
            color: #7f8c8d;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🔐</div>
            <h1>Reset Password</h1>
            <p>Create a new password for your account</p>
        </div>

        <div id="alertMessage" class="alert"></div>

        <form id="resetForm" style="display: none;">
            <div class="requirements" id="requirements">
                <strong>Password Requirements:</strong>
                <div class="requirement" id="length-req">
                    <span class="requirement-check">○</span>
                    <span>At least 6 characters</span>
                </div>
                <div class="requirement" id="letter-req">
                    <span class="requirement-check">○</span>
                    <span>Contains letters (a-z, A-Z)</span>
                </div>
                <div class="requirement" id="number-req">
                    <span class="requirement-check">○</span>
                    <span>Contains numbers (0-9)</span>
                </div>
            </div>

            <div class="form-group">
                <label for="password">New Password</label>
                <input type="password" id="password" name="password" required autocomplete="new-password">
                <small>Create a strong password</small>
            </div>

            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required autocomplete="new-password">
                <small>Must match the password above</small>
            </div>

            <button type="submit" class="button" id="submitBtn">Reset Password</button>
        </form>

        <div class="footer">
            <p>Remember your password? <a href="/static/login.html">Back to Login</a></p>
        </div>
    </div>

    <script>
        let tokenValid = false;

        // Check token on page load
        document.addEventListener('DOMContentLoaded', function() {
            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');

            if (!token) {
                showAlert('No reset token found in URL', 'error');
                return;
            }

            // For now, we assume token is valid if present
            // In production, you might want to validate it first
            tokenValid = true;
            document.getElementById('resetForm').style.display = 'block';

            // Setup password validation
            const passwordInput = document.getElementById('password');
            const confirmInput = document.getElementById('confirmPassword');

            passwordInput.addEventListener('input', validatePassword);
            confirmInput.addEventListener('input', validatePassword);
        });

        function validatePassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            // Check length
            const lengthCheck = password.length >= 6;
            updateRequirement('length-req', lengthCheck);

            // Check letters
            const letterCheck = /[a-zA-Z]/.test(password);
            updateRequirement('letter-req', letterCheck);

            // Check numbers
            const numberCheck = /[0-9]/.test(password);
            updateRequirement('number-req', numberCheck);

            // Check match
            const matchValid = password === confirm && confirm.length > 0;
            const button = document.getElementById('submitBtn');
            button.disabled = !(lengthCheck && letterCheck && numberCheck && matchValid);
        }

        function updateRequirement(id, met) {
            const elem = document.getElementById(id);
            if (met) {
                elem.classList.add('met');
                elem.querySelector('.requirement-check').textContent = '✓';
            } else {
                elem.classList.remove('met');
                elem.querySelector('.requirement-check').textContent = '○';
            }
        }

        function showAlert(message, type) {
            const alert = document.getElementById('alertMessage');
            alert.textContent = message;
            alert.className = `alert ${type}`;
        }

        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const params = new URLSearchParams(window.location.search);
            const token = params.get('token');
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            // Validate passwords match
            if (password !== confirmPassword) {
                showAlert('Passwords do not match', 'error');
                return;
            }

            // Validate password requirements
            if (password.length < 6 || !/[a-zA-Z]/.test(password) || !/[0-9]/.test(password)) {
                showAlert('Password does not meet requirements', 'error');
                return;
            }

            const submitBtn = document.getElementById('submitBtn');
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="spinner"></span>Resetting Password...';

            try {
                const response = await fetch('/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        password: password
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert('Password reset successfully! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/static/login.html';
                    }, 2000);
                } else {
                    showAlert(data.detail || 'Password reset failed', 'error');
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            } catch (error) {
                showAlert('An error occurred: ' + error.message, 'error');
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Reset Password';
            }
        });
    </script>
</body>
</html>
